<text x="675.0" y="130.0" class="label" text-anchor="start">How to read it</text>
<text x="675.0" y="162.0" class="small" text-anchor="start">Darker cells mean higher r2</text>
<text x="675.0" y="190.0" class="small" text-anchor="start">Blocks suggest inherited haplotypes</text>
<text x="675.0" y="218.0" class="small" text-anchor="start">A lead SNP can tag nearby variants</text>
<text x="675.0" y="246.0" class="small" text-anchor="start">LD patterns differ by ancestry</text>
<text x="675.0" y="274.0" class="small" text-anchor="start">and by species or breeding history</text>
